<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>God Mode — مكتبة حكاية</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --gold:#E0A800;--gold2:#FFD700;--gold3:#B8860B;
  --bg:#0a0c10;--surface:#111318;--card:#181b22;--card2:#1e2129;
  --text:#e8ecf1;--text2:#8892a0;--border:#23272f;--border2:#2a2e38;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f59e0b;--purple:#a855f7;
  --gold-glow:rgba(224,168,0,.08);--radius:10px;--shadow:0 2px 16px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter','SF Pro','system-ui',sans-serif;display:flex;min-height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}
.sidebar{width:220px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0}
.sidebar-header{padding:16px 18px;border-bottom:1px solid var(--border)}
.sidebar-header .logo{font-size:17px;font-weight:800;color:var(--gold2);display:flex;align-items:center;gap:8px}
.sidebar-header .sub{font-size:10px;color:var(--text2);margin-top:1px;opacity:.5}
.sidebar-nav{flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.sidebar-nav button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;background:transparent;border:none;color:var(--text2);font-size:13px;cursor:pointer;border-radius:var(--radius);text-align:right;font-weight:450;transition:all .15s}
.sidebar-nav button:hover{background:var(--gold-glow);color:var(--text)}
.sidebar-nav button.active{background:var(--gold-glow);color:var(--gold2);font-weight:600}
.sidebar-nav button .icon{font-size:15px;width:22px;text-align:center;opacity:.7}
.sidebar-nav button.active .icon{opacity:1}
.sidebar-nav .count{margin-right:auto;background:var(--card);color:var(--text2);font-size:10px;padding:1px 8px;border-radius:10px;font-weight:500}
.sidebar-nav button.active .count{background:rgba(224,168,0,.12);color:var(--gold2)}
.sidebar-nav .divider{height:1px;background:var(--border);margin:6px 10px}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2)}
.sidebar-footer .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.sidebar-footer button{background:transparent;border:none;color:var(--text2);padding:3px 6px;border-radius:4px;cursor:pointer;font-size:11px}
.sidebar-footer button:hover{color:var(--gold)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;align-items:center;gap:12px;padding:10px 22px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.header h1{font-size:15px;font-weight:600;flex:1}
.search-box{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:12px;color:var(--text);width:180px;outline:none;transition:all .2s}
.search-box:focus{border-color:var(--gold);width:240px;box-shadow:0 0 0 3px var(--gold-glow)}
.content{flex:1;padding:18px 22px;overflow-y:auto}
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;border:none;font-size:12px;cursor:pointer;font-weight:550;transition:all .15s}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-icon{background:transparent;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:12px;color:var(--text2);padding:4px 6px;line-height:1;transition:all .15s}
.btn-icon:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-card .row{display:flex;align-items:center;gap:12px}
.stat-card .icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-card .val{font-size:24px;font-weight:700;line-height:1.1}
.stat-card .lbl{font-size:11px;color:var(--text2);margin-top:1px}
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:1000px){.dashboard-grid{grid-template-columns:1fr}}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.dash-card h3{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.chart-wrap{height:200px;position:relative}
.list-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.list-item:last-child{border-bottom:none}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--surface);padding:8px 11px;font-size:10px;font-weight:600;color:var(--text2);text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 11px;font-size:12px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.012)}
.table-img{width:32px;height:32px;object-fit:cover;border-radius:5px;background:var(--surface)}
.tag{display:inline-block;background:var(--surface);padding:2px 7px;border-radius:4px;font-size:10px;color:var(--text2)}
.status-badge{padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block}
.s-pending{background:rgba(245,158,11,.12);color:var(--orange)}
.s-delivering{background:rgba(59,130,246,.12);color:var(--blue)}
.s-delivered{background:rgba(34,197,94,.12);color:var(--green)}
.s-cancelled{background:rgba(239,68,68,.12);color:var(--red)}
.form-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center;padding:16px;backdrop-filter:blur(4px)}
.form-overlay.open{display:flex}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;width:500px;max-width:100%;max-height:85vh;overflow-y:auto;animation:scaleIn .2s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)translateY(8px)}to{opacity:1;transform:scale(1)translateY(0)}}
.form-card h3{font-size:14px;margin-bottom:16px;color:var(--gold2)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 11px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);outline:none;transition:all .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.form-group textarea{resize:vertical;min-height:50px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.upload-area{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.upload-area:hover,.upload-area.dragover{border-color:var(--gold);background:var(--gold-glow)}
.upload-area img{max-height:80px;border-radius:5px}
.upload-progress{height:3px;background:var(--surface);border-radius:2px;overflow:hidden;margin-top:6px;display:none}
.upload-progress.active{display:block}
.upload-progress .bar{height:100%;background:var(--gold);width:0%;transition:width .3s}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.settings-grid .full{grid-column:1/-1}
.group-label{font-size:12px;color:var(--gold2);font-weight:600;margin-top:12px;margin-bottom:4px;grid-column:1/-1}
.color-pick{display:flex;gap:8px;align-items:center}
.color-pick input[type=color]{width:42px;height:42px;border:1px solid var(--border);border-radius:7px;cursor:pointer;padding:2px;background:var(--surface);flex-shrink:0}
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;min-height:350px}
@media(max-width:900px){.kanban-board{grid-template-columns:1fr 1fr}}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px}
.kanban-col .col-header{font-size:11px;font-weight:600;color:var(--text2);padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.kanban-col .col-header .count{margin-right:auto;background:var(--card);padding:1px 6px;border-radius:4px;font-size:10px}
.kanban-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px;cursor:pointer;font-size:12px;transition:all .15s}
.kanban-card:hover{border-color:var(--text2);transform:translateY(-1px)}
.kanban-card .name{font-weight:600}
.kanban-card .total{color:var(--gold2);font-weight:600;font-size:11px}
.kanban-card .meta{color:var(--text2);font-size:10px;margin-top:2px}
.kanban-card .items{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;background:var(--surface);color:var(--text2);margin-top:4px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:999;justify-content:center;align-items:center;padding:16px;backdrop-filter:blur(4px)}
.modal.open{display:flex}
.modal-content{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;width:580px;max-width:100%;max-height:80vh;overflow-y:auto;animation:scaleIn .2s ease}
.modal-content h2{font-size:15px;color:var(--gold2);margin-bottom:14px}
.order-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.order-detail-grid .item{background:var(--surface);padding:8px 11px;border-radius:6px}
.order-detail-grid .item .lbl{font-size:9px;color:var(--text2);margin-bottom:2px}
.order-detail-grid .item .val{font-size:13px;font-weight:600}
.empty-state{padding:40px;text-align:center;color:var(--text2)}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bulk-bar{display:none;align-items:center;gap:10px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;font-size:12px}
.bulk-bar.show{display:flex}
.export-btn{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:5px 11px;color:var(--text2);cursor:pointer;font-size:11px;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.export-btn:hover{border-color:var(--gold);color:var(--gold)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%)translateY(16px);background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:12px;z-index:2000;opacity:0;transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%)translateY(0);pointer-events:auto}
#toast.error{border-color:var(--red);color:var(--red)}
.toolbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.toolbar .spacer{flex:1}
@media(max-width:800px){
  .sidebar{width:52px}
  .sidebar-header .logo span,.sidebar-header .sub,.sidebar-nav button span:not(.icon),.sidebar-nav .count,.sidebar-footer{display:none}
  .sidebar-nav button{padding:10px;justify-content:center}
  .sidebar-nav .divider{margin:3px 4px}
  .settings-grid{grid-template-columns:1fr}
  .content{padding:12px}
  .search-box{width:120px}
  .search-box:focus{width:150px}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">⚡<span> God Mode</span></div>
    <div class="sub">مكتبة حكاية</div>
  </div>
  <nav class="sidebar-nav" id="sideNav">
    <button class="active" data-tab="dashboard"><span class="icon">📊</span><span>لوحة البيانات</span></button>
    <button data-tab="products"><span class="icon">📦</span><span>المنتجات</span><span class="count" id="cProducts">0</span></button>
    <button data-tab="categories"><span class="icon">🏷️</span><span>الأقسام</span><span class="count" id="cCategories">0</span></button>
    <button data-tab="orders"><span class="icon">📋</span><span>الطلبات</span><span class="count" id="cOrders">0</span></button>
    <button data-tab="kanban" style="color:var(--gold2)"><span class="icon">📌</span><span>Kanban</span></button>
    <div class="divider"></div>
    <button data-tab="analytics"><span class="icon">📈</span><span>التحليلات</span></button>
    <button data-tab="splash"><span class="icon">🎨</span><span>مصمم الشاشة</span></button>
    <button data-tab="settings"><span class="icon">⚙️</span><span>الإعدادات</span></button>
    <button data-tab="fcm"><span class="icon">🔔</span><span>الإشعارات</span><span class="count" id="cFcm">0</span></button>
  </nav>
  <div class="sidebar-footer">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">جاري التحميل...</span>
    <span style="flex:1"></span>
    <button onclick="refreshAll()">🔄</button>
    <label style="display:flex;align-items:center;gap:3px;font-size:10px;cursor:pointer">
      <input type="checkbox" id="autoReload" checked onchange="toggleAutoReload()"> تلقائي
    </label>
  </div>
</div>

<div class="main">
  <div class="header">
    <h1 id="pageTitle">📊 لوحة البيانات</h1>
    <input type="text" id="searchBox" class="search-box" placeholder="🔍 بحث..." oninput="filterTable()">
    <button class="btn btn-gold btn-sm" id="addBtn" onclick="openForm()" style="display:none">+ إضافة</button>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<div class="form-overlay" id="formOverlay">
  <div class="form-card">
    <h3 id="formTitle">إضافة</h3>
    <input type="hidden" id="editId">
    <input type="hidden" id="formType" value="products">
    <div id="formFields"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeForm()">إلغاء</button>
      <button class="btn btn-gold" onclick="saveItem()">💾 حفظ</button>
    </div>
  </div>
</div>

<div class="modal" id="orderModal">
  <div class="modal-content">
    <h2 id="modalTitle">تفاصيل الطلب</h2>
    <div class="order-detail-grid" id="orderDetailGrid"></div>
    <div style="margin-bottom:10px;font-size:13px;font-weight:600">المنتجات:</div>
    <div id="orderDetailItems" style="margin-bottom:14px"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="orderDetailActions"></div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal('orderModal')">إغلاق</button></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ──
const PROJ='6a10ffc6002688e9bfb2', DB='hikaya_store', BUCKET='products';
const IMG = id => id ? `https://fra.cloud.appwrite.io/v1/storage/buckets/${BUCKET}/files/${id}/view?project=${PROJ}` : '';
let allData = {products:[], categories:[], orders:[], settings:[]};
let currentTab = 'dashboard', orderFilter = '', selected = new Set();

// ── API ──
async function api(method, path, body) {
  const opts = { method, headers:{}, mode:'cors' };
  if (body) { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const r = await fetch(path, opts);
  if (r.status===204) return {};
  const t = await r.text();
  if (!t) return {};
  const j = JSON.parse(t);
  if (!r.ok) throw new Error(j.message||j.error||r.statusText);
  return j;
}

async function listAll(col) {
  let docs=[], limit=100, offset=0;
  while (true) {
    const r = await api('GET', `/v1/databases/${DB}/collections/${col}/documents?limit=${limit}&offset=${offset}`);
    docs=docs.concat(r.documents);
    if (r.documents.length<limit) break;
    offset+=limit;
  }
  return docs;
}

function mapDoc(d) {
  const o = {id:d.$id,docId:d.$id};
  for (const k in d) if (!k.startsWith('$')) o[k]=d[k];
  return o;
}

async function loadAll() {
  try {
    const [pp,cc,oo] = await Promise.all([listAll('products'),listAll('categories'),listAll('orders')]);
    allData.products=pp.map(mapDoc);
    allData.categories=cc.map(mapDoc);
    allData.orders=oo.map(mapDoc);
    document.getElementById('cProducts').textContent=allData.products.length;
    document.getElementById('cCategories').textContent=allData.categories.length;
    document.getElementById('cOrders').textContent=allData.orders.length;
    renderCurrent();
    setStatus('connected');
  } catch(e) { setStatus('error'); showToast('خطأ في التحميل',1); }
}

function setStatus(s) {
  const dot=document.getElementById('statusDot'), txt=document.getElementById('statusText');
  if (s==='connected') { dot.style.background='var(--green)'; txt.textContent='متصل'; }
  else if (s==='error') { dot.style.background='var(--red)'; txt.textContent='خطأ'; }
  else { dot.style.background='var(--orange)'; txt.textContent='جاري...'; }
}

function renderCurrent() {
  const fn = {dashboard:renderDashboard, products:()=>renderTable('products'), categories:()=>renderTable('categories'), orders:()=>renderTable('orders'), kanban:renderKanban, analytics:renderAnalytics, splash:loadSettings, settings:loadSettings, fcm:loadFCM};
  if (fn[currentTab]) fn[currentTab]();
}

// ── Navigation ──
function switchTab(tab) {
  document.querySelectorAll('#sideNav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  currentTab=tab;
  document.getElementById('pageTitle').textContent = {dashboard:'📊 لوحة البيانات', products:'📦 المنتجات', categories:'🏷️ الأقسام', orders:'📋 الطلبات', kanban:'📌 لوحة المهام', analytics:'📈 التحليلات', splash:'🎨 مصمم الشاشة', settings:'⚙️ الإعدادات', fcm:'🔔 الإشعارات'}[tab]||tab;
  document.getElementById('addBtn').style.display = (tab==='products'||tab==='categories')?'inline-flex':'none';
  document.getElementById('searchBox').style.display = (tab==='products'||tab==='categories'||tab==='orders')?'inline-block':'none';
  renderCurrent();
}

document.getElementById('sideNav').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (btn && btn.dataset.tab) switchTab(btn.dataset.tab);
});

// ── Table ──
function renderTable(tab) {
  const el = document.getElementById('mainContent');
  let rows = [...allData[tab]];
  if (tab==='orders' && orderFilter) rows=rows.filter(r=>r.status===orderFilter);
  const q = (document.getElementById('searchBox').value||'').toLowerCase();
  if (q) rows=rows.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(q)));
  const statusClass = s => ({'قيد المعالجة':'s-pending','قيد التوصيل':'s-delivering','تم التوصيل':'s-delivered','ملغي':'s-cancelled'})[s]||'s-pending';
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  if (tab==='products') {
    el.innerHTML=`
      <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">
        <button class="export-btn" onclick="exportCSV('products')">📥 CSV</button>
      </div>
      <div class="bulk-bar" id="bulkBar"><span id="bulkCount">0</span> محدد
        <button class="btn btn-gold btn-sm" onclick="bulkToggle()">تفعيل/إلغاء</button>
        <button class="btn btn-danger btn-sm" onclick="bulkDelete()">حذف</button>
        <button class="btn btn-ghost btn-sm" onclick="clearSel()">إلغاء</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th style="width:28px"><input type="checkbox" onchange="toggleAll(this.checked)"></th><th>الصورة</th><th>الاسم</th><th>القسم</th><th>السعر</th><th>متاح</th><th>الوسام</th><th></th></tr></thead>
        <tbody>${rows.length?rows.map(r=>`<tr>
          <td><input type="checkbox" value="${r.id}" ${selected.has(r.id)?'checked':''} onchange="toggleSel('${r.id}',this.checked)"></td>
          <td>${r.imageFileId?`<img class="table-img" src="${IMG(r.imageFileId)}">`:'<span style="color:var(--text2)">-</span>'}</td>
          <td><b>${esc(r.name)}</b></td>
          <td><span class="tag">${esc(r.category)}</span></td>
          <td style="color:var(--gold2);font-weight:600">${(r.price||0).toLocaleString()} د.ع</td>
          <td>${r.available!==false?'✅':'❌'}</td>

const FIELDS = {
  products:[{n:'name',l:'الاسم',t:'text',r:1},{n:'category',l:'القسم',t:'text',r:1},{n:'price',l:'السعر (دينار)',t:'number',r:1},{n:'description',l:'الوصف',t:'textarea'},{n:'badge',l:'الوسام',t:'text',p:'مثل: جديد'},{n:'available',l:'متاح',t:'checkbox'}],
  categories:[{n:'name',l:'الاسم',t:'text',r:1},{n:'icon',l:'الأيقونة (إيموجي)',t:'text',r:1,p:'📚'},{n:'sortOrder',l:'الترتيب',t:'number'}],
};

function openForm(type,data) {
  type=type||currentTab;
  if(!['products','categories'].includes(type))return;
  document.getElementById('formType').value=type;
  document.getElementById('editId').value=data?data.id:'';
  document.getElementById('formTitle').textContent=(data?'✏️ تعديل ':'➕ إضافة ')+(type==='products'?'منتج':'قسم');
  let h=(type==='products')?'<div id="uploadCont"></div>':'';
  FIELDS[type].forEach(f=>{
    const v=data?(data[f.n]??''):(f.t==='checkbox'?true:'');
    if(f.t==='checkbox')h+=`<div class="form-group"><label><input type="checkbox" name="${f.n}" ${v?'checked':''}> ${f.l}</label></div>`;
    else if(f.t==='textarea')h+=`<div class="form-group"><label>${f.l}</label><textarea name="${f.n}" placeholder="${f.p||''}">${esc(String(v))}</textarea></div>`;
    else h+=`<div class="form-group"><label>${f.l}${f.r?' *':''}</label><input type="${f.t}" name="${f.n}" value="${esc(String(v))}" ${f.r?'required':''} placeholder="${f.p||''}"></div>`;
  });
  document.getElementById('formFields').innerHTML=h;
  document.getElementById('formOverlay').classList.add('open');
  if(type==='products')setTimeout(()=>initUpload(data?data.imageFileId:null),50);
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function closeForm(){document.getElementById('formOverlay').classList.remove('open');window.uploadedFileId=null}

async function saveItem(){
  const type=document.getElementById('formType').value,id=document.getElementById('editId').value;
  const data={};
  FIELDS[type].forEach(f=>{const el=document.querySelector(`[name="${f.n}"]`);if(el)data[f.n]=f.t==='checkbox'?el.checked:f.t==='number'?Number(el.value):el.value});
  if(type==='products'&&window.uploadedFileId)data.imageFileId=window.uploadedFileId;
  try{
    if(id)await api('PATCH',`/v1/databases/${DB}/collections/${type}/documents/${id}`,{data});
    else await api('POST',`/v1/databases/${DB}/collections/${type}/documents`,{documentId:'unique()',data,permissions:['read("any")','write("any")']});
    closeForm();await loadAll();showToast('✅ تم الحفظ');
  }catch(e){showToast('❌ '+e.message,1)}
}

async function deleteItem(type,id){
  if(!confirm('⚠️ متأكد من الحذف؟'))return;
  try{await api('DELETE',`/v1/databases/${DB}/collections/${type}/documents/${id}`);await loadAll();showToast('✅ تم الحذف')}
  catch(e){showToast('❌ '+e.message,1)}
}

async function editItem(type,id){
  try{const d=await api('GET',`/v1/databases/${DB}/collections/${type}/documents/${id}`);openForm(type,{id:d.$id,...d})}
  catch(e){showToast('❌ '+e.message,1)}
}

// ── Upload ──
function initUpload(currentId){
  window.uploadedFileId=currentId||null;
  document.getElementById('uploadCont').innerHTML=`
    <div class="form-group"><label>صورة المنتج</label>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInp').click()">
      <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="handleFile(this)">
      <div id="uploadPrev">${window.uploadedFileId?`<img src="${IMG(window.uploadedFileId)}">`:'📁 اختر صورة أو اسحبها هنا'}</div>
      <div class="upload-progress" id="uploadProg"><div class="bar" id="uploadBar"></div></div>
    </div>
    <div style="font-size:11px;color:var(--text2)" id="uploadStatus">${window.uploadedFileId?'✅ تم الرفع':'لم يتم اختيار صورة'}</div></div>`;
  const a=document.getElementById('uploadArea');
  a.addEventListener('dragover',e=>{e.preventDefault();a.classList.add('dragover')});
  a.addEventListener('dragleave',()=>a.classList.remove('dragover'));
  a.addEventListener('drop',e=>{e.preventDefault();a.classList.remove('dragover');if(e.dataTransfer.files.length)uploadFile(e.dataTransfer.files[0])});
}

function handleFile(el){if(el.files.length)uploadFile(el.files[0])}

async function uploadFile(file){
  if(!file.type.startsWith('image/')){showToast('يرجى اختيار صورة',1);return}
  if(file.size>5*1024*1024){showToast('الحجم أقل من 5 ميجابايت',1);return}
  const p=document.getElementById('uploadProg'),b=document.getElementById('uploadBar'),s=document.getElementById('uploadStatus');
  p.classList.add('active');b.style.width='30%';s.textContent='جاري الرفع...';
  try{
    const fd=new FormData();fd.append('file',file);
    const r=await fetch('/api/upload',{method:'POST',body:fd});
    if(!r.ok){const e=await r.json();throw new Error(e.error||'فشل الرفع')}
    const d=await r.json();
    window.uploadedFileId=d.fileId;
    b.style.width='100%';
    document.getElementById('uploadPrev').innerHTML=`<img src="${d.url}">`;

// ── CSV Export ──
function exportCSV(tab){
  const rows=allData[tab];if(!rows.length){showToast('لا توجد بيانات',1);return}
  const esc=s=>String(s).replace(/"/g,'""');
  let csv='';
  if(tab==='orders'){csv='المعرف,العميل,الهاتف,المحافظة,العنوان,المجموع,الحالة,التاريخ\n';rows.forEach(r=>csv+=`"${r.id}","${esc(r.customerName)}","${r.phone}","${esc(r.governorate)}","${esc(r.address)}",${r.total||0},"${r.status}","${r.date||''}"\n`)}
  else if(tab==='products'){csv='الاسم,القسم,السعر,متاح\n';rows.forEach(r=>csv+=`"${esc(r.name)}","${esc(r.category)}",${r.price||0},${r.available!==false?'نعم':'لا'}\n`)}
  else if(tab==='categories'){csv='الاسم,الترتيب\n';rows.forEach(r=>csv+=`"${esc(r.name)}",${r.sortOrder||''}\n`)}
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${tab}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(a.href);showToast('✅ تم التصدير');
}

let animTimer=null;
function playAnim(){
  resetAnim();
  const d=parseInt(g('splash_anim_duration','700')),del=parseInt(g('splash_anim_delay','150'));
  document.getElementById('speedLabel').textContent=d<500?'سريع':d<1000?'عادي':'بطيء';
  animTimer=setTimeout(()=>{const e=document.getElementById('aw1');if(e){e.style.transition='all '+d+'ms cubic-bezier(0.4,0,0.2,1)';e.style.opacity='1';e.style.transform='translateX(0)'}},100);
  animTimer=setTimeout(()=>{const e=document.getElementById('aw2');if(e){e.style.transition='all '+d+'ms cubic-bezier(0.4,0,0.2,1)';e.style.opacity='1';e.style.transform='translateX(0)'}},100+d+del);
  animTimer=setTimeout(()=>{const e=document.getElementById('asub');if(e){e.style.transition='all '+(d-100)+'ms cubic-bezier(0.4,0,0.2,1)';e.style.opacity='1';e.style.transform='translateY(0)'}},100+d*2+del*2);
  animTimer=setTimeout(()=>{const e=document.getElementById('abw');if(e){e.style.transition='all 400ms cubic-bezier(0.4,0,0.2,1)';e.style.opacity='1'}},100+d*3+del*3);
}

function resetAnim(){
  if(animTimer){clearTimeout(animTimer);animTimer=null}
  ['aw1','aw2','asub','abw'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.style.transition='none';
    if(id==='abw')el.style.opacity='0';
    else if(id==='asub'){el.style.opacity='0';el.style.transform='translateY(15px)'}
    else{el.style.opacity='0';el.style.transform=id==='aw1'?'translateX(-30px)':'translateX(30px)'}
  });
  void(document.getElementById('animPreview')?.offsetHeight);
}

async function saveAllSettings(){
  const all=[...SETTINGS,...SPLASH_FIELDS];
  const btn=document.querySelector('.btn-gold');
  if(btn){btn.textContent='⏳ جاري...';btn.disabled=true}
  let errs=0;
  for(const f of all){
    const el=document.getElementById(`s-${f.k}`),idEl=document.getElementById(`s-${f.k}-id`);
    if(!el)continue;
    const val=el.value,docId=idEl?idEl.value:'';
    try{
      if(docId)await api('PATCH',`/v1/databases/${DB}/collections/settings/documents/${docId}`,{data:{value:val}});
      else{const r=await api('POST',`/v1/databases/${DB}/collections/settings/documents`,{documentId:'unique()',data:{key:f.k,value:val}});allData.settings.push(mapDoc(r))}
    }catch(e){errs++}
  }
  if(btn){btn.textContent='💾 حفظ الإعدادات';btn.disabled=false}
  if(errs)showToast(`تم الحفظ مع ${errs} أخطاء`,1);
  else{showToast('✅ تم الحفظ');loadSettings()}
}

// ── FCM ──
async function loadFCM(){
  try{
    const r=await fetch('/api/fcm/tokens');const d=await r.json();
    document.getElementById('cFcm').textContent=d.count;
    const el=document.getElementById('mainContent');
    el.innerHTML=`
      <div class="stats-grid">
        <div class="stat-card"><div class="row"><div class="icon" style="background:rgba(59,130,246,.1)">🔔</div><div><div class="val" style="color:var(--blue)">${d.count}</div><div class="lbl">الأجهزة المسجلة</div></div></div></div>
        <div class="stat-card"><div class="row"><div class="icon" style="background:rgba(34,197,94,.1)">📤</div><div><div class="val" style="color:var(--green)">${d.count>0?'نشط':'غير نشط'}</div><div class="lbl">حالة الإشعارات</div></div></div></div>
      </div>
      ${d.count===0?'<div class="empty-state"><div style="font-size:40px;margin-bottom:10px">📭</div><p>لا توجد أجهزة مسجلة</p><p style="font-size:12px">قم بتثبيت التطبيق وتسجيل الدخول</p></div>':d.tokens.map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;direction:ltr;text-align:left;font-family:monospace"><span>📱</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t}</span><button class="btn btn-ghost btn-sm" onclick="testFCM('${t}')">🔔 اختبار</button></div>`).join('')}`;
  }catch(e){showToast('خطأ في تحميل الإشعارات',1)}
}

async function testFCM(token){
  try{await fetch('/api/fcm/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});showToast('✅ تم إرسال إشعار اختبار')}
  catch(e){showToast('❌ فشل الإرسال',1)}
}

// ── Modals ──
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.getElementById('formOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeForm()});
document.getElementById('orderModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal('orderModal')});

// ── Utils ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function filterTable(){
  if(['dashboard','settings','fcm','analytics','kanban','splash'].includes(currentTab))return;
  renderTable(currentTab);
}

function refreshAll(){loadAll();if(currentTab==='settings'||currentTab==='splash')loadSettings();if(currentTab==='fcm')loadFCM();showToast('🔄 تم التحديث')}

function showToast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=''+(err?'error':'');
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>t.classList.remove('show'),3500);
}

let autoTimer=null;
function toggleAutoReload(){
  if(document.getElementById('autoReload').checked){autoTimer=setInterval(()=>{loadAll();if(currentTab==='fcm')loadFCM()},30000)}
  else{clearInterval(autoTimer);autoTimer=null}
}
document.addEventListener('DOMContentLoaded',()=>{autoTimer=setInterval(()=>{loadAll();if(currentTab==='fcm')loadFCM()},30000)});

// ── Init ──
loadAll();
</script>
